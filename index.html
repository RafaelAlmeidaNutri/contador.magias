<!-- ✦ CONTADOR DE MAGIAS — Quest Portal Snippet ✦ -->
<!-- Cole este bloco inteiro no editor HTML do seu widget -->

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

#cm-root *{box-sizing:border-box;margin:0;padding:0}
#cm-root{
  --cm-bg:#0d0a14;--cm-surface:#16111f;--cm-border:#2e1f4a;
  --cm-accent:#7c3aed;--cm-accent2:#a855f7;--cm-glow:#b57bff;
  --cm-danger:#e05252;--cm-gold:#c9a84c;--cm-gold2:#f0cc6e;
  --cm-text:#e8deff;--cm-muted:#7a6b99;--cm-green:#4ade80;
  background:var(--cm-bg);
  background-image:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,.12) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(168,85,247,.08) 0%,transparent 50%);
  font-family:'Crimson Text',Georgia,serif;
  color:var(--cm-text);
  padding:20px 14px;
  min-height:200px;
  border-radius:12px;
}

/* HEADER */
#cm-root .cm-header{text-align:center;margin-bottom:22px;position:relative}
#cm-root .cm-header::before{content:'';display:block;width:80px;height:1px;
  background:linear-gradient(to right,transparent,var(--cm-gold));margin:0 auto 10px}
#cm-root .cm-header::after{content:'';display:block;width:80px;height:1px;
  background:linear-gradient(to left,transparent,var(--cm-gold));margin:10px auto 0}
#cm-root .cm-h1{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;
  letter-spacing:.12em;color:var(--cm-gold2);text-shadow:0 0 20px rgba(201,168,76,.4);
  text-transform:uppercase}
#cm-root .cm-sub{font-size:.85rem;color:var(--cm-muted);margin-top:3px;font-style:italic}

/* TURN BAR */
#cm-root .cm-turn-bar{display:flex;align-items:center;justify-content:space-between;
  background:var(--cm-surface);border:1px solid var(--cm-border);border-radius:10px;
  padding:12px 18px;margin-bottom:18px;position:relative;overflow:hidden}
#cm-root .cm-turn-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--cm-accent2),transparent)}
#cm-root .cm-turn-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;
  color:var(--cm-muted);text-transform:uppercase;margin-bottom:2px}
#cm-root .cm-turn-num{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:700;
  color:var(--cm-glow);text-shadow:0 0 16px rgba(181,123,255,.6);line-height:1}
#cm-root .cm-turn-num span{font-size:.85rem;color:var(--cm-muted);font-weight:400}
#cm-root .cm-btn-next{background:linear-gradient(135deg,var(--cm-accent),var(--cm-accent2));
  border:none;border-radius:8px;color:#fff;font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.1em;padding:9px 16px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 16px rgba(124,58,237,.4);transition:all .2s}
#cm-root .cm-btn-next:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(124,58,237,.6)}

/* FORM */
#cm-root .cm-form{background:var(--cm-surface);border:1px solid var(--cm-border);
  border-radius:10px;padding:14px;margin-bottom:18px}
#cm-root .cm-form-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;
  color:var(--cm-muted);text-transform:uppercase;margin-bottom:10px}
#cm-root .cm-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
#cm-root input[type=text],#cm-root input[type=number],#cm-root select{
  background:rgba(13,10,20,.8);border:1px solid var(--cm-border);border-radius:6px;
  color:var(--cm-text);font-family:'Crimson Text',Georgia,serif;font-size:.95rem;
  padding:7px 10px;width:100%;outline:none;transition:border-color .2s}
#cm-root input:focus,#cm-root select:focus{border-color:var(--cm-accent2)}
#cm-root input::placeholder{color:var(--cm-muted)}
#cm-root select option{background:#1a1228}
#cm-root .cm-check-row{display:flex;align-items:center;gap:7px;margin-top:4px}
#cm-root .cm-check-row label{font-size:.85rem;color:var(--cm-muted);cursor:pointer;user-select:none}
#cm-root input[type=checkbox]{accent-color:#60a5fa;width:13px;height:13px;cursor:pointer;flex-shrink:0}
#cm-root .cm-form-actions{display:flex;gap:7px;margin-top:9px}
#cm-root .cm-btn-add{flex:1;background:linear-gradient(135deg,#1e3a2f,#2d5a42);
  border:1px solid #3d7a55;border-radius:6px;color:var(--cm-green);font-family:'Cinzel',serif;
  font-size:.68rem;letter-spacing:.1em;padding:9px;cursor:pointer;text-transform:uppercase;transition:all .2s}
#cm-root .cm-btn-add:hover{background:linear-gradient(135deg,#2a4d3e,#3d6e52);border-color:var(--cm-green)}
#cm-root .cm-btn-clear{background:transparent;border:1px solid var(--cm-border);border-radius:6px;
  color:var(--cm-muted);font-family:'Cinzel',serif;font-size:.68rem;padding:9px 12px;cursor:pointer;transition:all .2s}
#cm-root .cm-btn-clear:hover{border-color:var(--cm-muted);color:var(--cm-text)}

/* SECTION TITLE */
#cm-root .cm-section{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;
  color:var(--cm-muted);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
#cm-root .cm-section::after{content:'';flex:1;height:1px;background:var(--cm-border)}

/* SPELL LIST */
#cm-root .cm-list{display:flex;flex-direction:column;gap:7px}
#cm-root .cm-empty{text-align:center;padding:28px;color:var(--cm-muted);font-style:italic;
  font-size:.9rem;border:1px dashed rgba(46,31,74,.5);border-radius:10px}

/* SPELL CARD */
@keyframes cm-fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cm-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,82,82,0)}50%{box-shadow:0 0 0 4px rgba(224,82,82,.15)}}

#cm-root .cm-card{background:var(--cm-surface);border:1px solid var(--cm-border);border-radius:10px;
  padding:11px 13px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  position:relative;overflow:hidden;animation:cm-fadeIn .3s ease;transition:border-color .3s}
#cm-root .cm-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:10px 0 0 10px;background:var(--cm-accent2)}
#cm-root .cm-card.urgent{border-color:rgba(224,82,82,.3);animation:cm-fadeIn .3s ease,cm-pulse 2s ease-in-out infinite}
#cm-root .cm-card.urgent::before{background:var(--cm-danger)}
#cm-root .cm-card.expiring{border-color:rgba(201,168,76,.3)}
#cm-root .cm-card.expiring::before{background:var(--cm-gold)}
#cm-root .cm-card.concentration::before{background:#60a5fa}

#cm-root .cm-spell-name{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;
  color:var(--cm-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
#cm-root .cm-spell-meta{font-size:.8rem;color:var(--cm-muted);margin-top:2px;
  display:flex;align-items:center;gap:7px;flex-wrap:wrap}
#cm-root .cm-badge{font-size:.6rem;font-family:'Cinzel',serif;letter-spacing:.04em;
  padding:1px 6px;border-radius:20px;text-transform:uppercase;border:1px solid}
#cm-root .cm-badge-conc{color:#60a5fa;border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08)}
#cm-root .cm-badge-dm{color:var(--cm-gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08)}

#cm-root .cm-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
#cm-root .cm-turns{text-align:center;min-width:48px}
#cm-root .cm-turns-num{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;line-height:1;
  color:var(--cm-glow);text-shadow:0 0 10px rgba(181,123,255,.5);transition:color .3s}
#cm-root .cm-card.urgent .cm-turns-num{color:var(--cm-danger);text-shadow:0 0 10px rgba(224,82,82,.5)}
#cm-root .cm-card.expiring .cm-turns-num{color:var(--cm-gold2);text-shadow:0 0 10px rgba(201,168,76,.5)}
#cm-root .cm-turns-lbl{font-size:.58rem;color:var(--cm-muted);font-family:'Cinzel',serif;
  letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
#cm-root .cm-btn-rm{background:transparent;border:1px solid rgba(224,82,82,.3);border-radius:6px;
  color:rgba(224,82,82,.5);cursor:pointer;font-size:.9rem;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#cm-root .cm-btn-rm:hover{color:var(--cm-danger);border-color:var(--cm-danger);background:rgba(224,82,82,.1)}

/* EXPIRED */
#cm-root .cm-exp-card{background:rgba(13,10,20,.5);border:1px solid rgba(46,31,74,.4);
  border-radius:8px;padding:7px 13px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;opacity:.5;animation:cm-fadeIn .3s ease;margin-bottom:6px}
#cm-root .cm-exp-name{font-family:'Cinzel',serif;font-size:.82rem;color:var(--cm-muted);text-decoration:line-through}
#cm-root .cm-exp-meta{font-size:.75rem;color:var(--cm-muted);font-style:italic}
#cm-root .cm-exp-tag{font-size:.7rem;color:var(--cm-muted);font-family:'Cinzel',serif}

/* FOOTER */
#cm-root .cm-footer{text-align:center;margin-top:20px}
#cm-root .cm-btn-reset{background:transparent;border:1px solid rgba(46,31,74,.6);border-radius:6px;
  color:var(--cm-muted);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;
  padding:7px 14px;cursor:pointer;text-transform:uppercase;transition:all .2s}
#cm-root .cm-btn-reset:hover{border-color:var(--cm-danger);color:var(--cm-danger)}

/* TOAST */
#cm-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#16111f;border:1px solid #2e1f4a;border-radius:8px;padding:9px 18px;
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:#b57bff;
  z-index:9999;transition:transform .3s ease;pointer-events:none;text-align:center;
  box-shadow:0 0 20px rgba(124,58,237,.3)}
#cm-toast.show{transform:translateX(-50%) translateY(0)}
</style>

<div id="cm-root">

  <div class="cm-header">
    <div class="cm-h1">✦ Magias Ativas ✦</div>
    <div class="cm-sub">Controle de duração por turnos</div>
  </div>

  <div class="cm-turn-bar">
    <div>
      <div class="cm-turn-label">Turno atual</div>
      <div class="cm-turn-num" id="cm-turn">1 <span>/ rodada</span></div>
    </div>
    <button class="cm-btn-next" onclick="cmNextTurn()">⟶ Próximo Turno</button>
  </div>

  <div class="cm-form">
    <div class="cm-form-title">✧ Adicionar Magia</div>
    <div class="cm-row">
      <input type="text" id="cm-name" placeholder="Nome da magia" />
      <input type="text" id="cm-caster" placeholder="Lançador" />
    </div>
    <div class="cm-row">
      <input type="number" id="cm-dur" placeholder="Duração (turnos)" min="1" value="3" />
      <select id="cm-type">
        <option value="normal">Magia comum</option>
        <option value="concentration">Concentração</option>
        <option value="dm">Efeito do Mestre</option>
      </select>
    </div>
    <div class="cm-check-row">
      <input type="checkbox" id="cm-fromnow" checked />
      <label for="cm-fromnow">Começa a contar a partir do turno atual</label>
    </div>
    <div class="cm-form-actions">
      <button class="cm-btn-add" onclick="cmAddSpell()">＋ Adicionar</button>
      <button class="cm-btn-clear" onclick="cmClearForm()">Limpar</button>
    </div>
  </div>

  <div class="cm-section">Efeitos ativos</div>
  <div class="cm-list" id="cm-list">
    <div class="cm-empty" id="cm-empty">Nenhuma magia ativa no momento.</div>
  </div>

  <div id="cm-exp-section" style="display:none">
    <div class="cm-section" style="margin-top:16px">Expiradas (último turno)</div>
    <div id="cm-exp-list"></div>
  </div>

  <div class="cm-footer">
    <button class="cm-btn-reset" onclick="cmResetAll()">⊘ Zerar tudo</button>
  </div>

</div>

<div id="cm-toast"></div>

<script>
(function(){
  var cmTurn=1,cmSpells=[],cmExpired=[],cmId=0;

  function q(id){return document.getElementById(id)}
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

  function toast(msg){
    var t=q('cm-toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show')},2200);
  }

  window.cmAddSpell=function(){
    var name=q('cm-name').value.trim();
    var caster=q('cm-caster').value.trim()||'—';
    var dur=parseInt(q('cm-dur').value);
    var type=q('cm-type').value;
    if(!name){toast('Informe o nome da magia!');return}
    if(!dur||dur<1){toast('Duração inválida!');return}
    cmSpells.push({id:++cmId,name:name,caster:caster,duration:dur,remaining:dur,type:type,start:cmTurn});
    cmRender();toast('"'+name+'" adicionada!');
  };

  window.cmClearForm=function(){
    q('cm-name').value='';q('cm-caster').value='';q('cm-dur').value='3';q('cm-type').value='normal';
  };

  window.cmRemove=function(id){
    cmSpells=cmSpells.filter(function(s){return s.id!==id});cmRender();
  };

  window.cmNextTurn=function(){
    cmTurn++;
    q('cm-turn').innerHTML=cmTurn+' <span>/ rodada</span>';
    var now=[];
    cmSpells.forEach(function(s){s.remaining--;if(s.remaining<=0)now.push(s)});
    if(now.length){
      cmExpired=now;
      cmSpells=cmSpells.filter(function(s){return s.remaining>0});
      now.forEach(function(s){toast('"'+s.name+'" expirou!')});
    } else {cmExpired=[]}
    cmRender();
  };

  window.cmResetAll=function(){
    if(!confirm('Zerar tudo? Todos os efeitos serão removidos.'))return;
    cmTurn=1;cmSpells=[];cmExpired=[];
    q('cm-turn').innerHTML='1 <span>/ rodada</span>';
    cmRender();
  };

  // Cache do elemento empty fora do render para não perder a referência
  var cmEmptyEl = null;

  function cmRender(){
    var list=q('cm-list');
    var expSec=q('cm-exp-section');
    var expList=q('cm-exp-list');

    // Guarda referência ao empty na primeira vez
    if(!cmEmptyEl) cmEmptyEl=q('cm-empty');

    // Remove apenas os cards de magia, preservando o empty no DOM
    var cards=list.querySelectorAll('.cm-card');
    for(var i=0;i<cards.length;i++) cards[i].parentNode.removeChild(cards[i]);

    if(cmSpells.length===0){
      cmEmptyEl.style.display='';
    } else {
      cmEmptyEl.style.display='none';
      cmSpells.forEach(function(s){
        var urg=s.remaining===1?'urgent':s.remaining===2?'expiring':s.type==='concentration'?'concentration':'';
        var badge=s.type==='concentration'?'<span class="cm-badge cm-badge-conc">Concentração</span>':
          s.type==='dm'?'<span class="cm-badge cm-badge-dm">Mestre</span>':'';
        var d=document.createElement('div');
        d.className='cm-card '+urg;
        d.innerHTML='<div style="min-width:0">'+
          '<div class="cm-spell-name">'+esc(s.name)+'</div>'+
          '<div class="cm-spell-meta"><span style="font-style:italic">'+esc(s.caster)+'</span>'+badge+'<span>T'+s.start+'</span></div>'+
          '</div>'+
          '<div class="cm-right">'+
          '<div class="cm-turns"><div class="cm-turns-num">'+s.remaining+'</div>'+
          '<div class="cm-turns-lbl">turno'+(s.remaining!==1?'s':'')+'</div></div>'+
          '<button class="cm-btn-rm" onclick="cmRemove('+s.id+')" title="Remover">✕</button>'+
          '</div>';
        list.appendChild(d);
      });
    }

    if(cmExpired.length){
      expSec.style.display='';expList.innerHTML='';
      cmExpired.forEach(function(s){
        var d=document.createElement('div');d.className='cm-exp-card';
        d.innerHTML='<div><div class="cm-exp-name">'+esc(s.name)+'</div>'+
          '<div class="cm-exp-meta">'+esc(s.caster)+' · '+s.duration+' turno'+(s.duration!==1?'s':'')+'</div></div>'+
          '<div class="cm-exp-tag">Expirou</div>';
        expList.appendChild(d);
      });
    } else {expSec.style.display='none'}
  }

  cmRender();
})();
</script>
